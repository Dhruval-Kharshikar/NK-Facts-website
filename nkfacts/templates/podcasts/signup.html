{% extends 'podcasts/base.html' %}
{% block title %}Sign Up – NK Facts{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:520px;">
    <div class="auth-logo">
      <img src="https://s3-us-west-2.amazonaws.com/anchor-generated-image-bank/production/podcast_uploaded400/12881165/12881165-1615969851822-c84e3f1dc2b4c.jpg"
           alt="NK Facts" style="width:100%; height:100%; object-fit:cover; border-radius:50%;"/>
    </div>
    <h1 class="auth-title">Join NK Facts 🌸</h1>
    <p class="auth-sub">Create your free account and start exploring</p>

    <form method="post">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="first_name">First Name</label>
          <input class="form-input" type="text" id="first_name" name="first_name" placeholder="First name" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="last_name">Last Name</label>
          <input class="form-input" type="text" id="last_name" name="last_name" placeholder="Last name"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" name="email" placeholder="your@email.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password1">Password</label>
        <div style="position:relative;">
          <input class="form-input" type="password" id="password1" name="password1"
                 placeholder="Create a password" required autocomplete="new-password"
                 style="padding-right:3rem;"/>
          <button type="button" onclick="togglePassword('password1','eye1')"
                  style="position:absolute;right:.8rem;top:50%;transform:translateY(-50%);
                         background:none;border:none;cursor:pointer;font-size:1.1rem;padding:0;">
            <span id="eye1">👁️</span>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password2">Confirm Password</label>
        <div style="position:relative;">
          <input class="form-input" type="password" id="password2" name="password2"
                 placeholder="Repeat your password" required autocomplete="new-password"
                 style="padding-right:3rem;"/>
          <button type="button" onclick="togglePassword('password2','eye2')"
                  style="position:absolute;right:.8rem;top:50%;transform:translateY(-50%);
                         background:none;border:none;cursor:pointer;font-size:1.1rem;padding:0;">
            <span id="eye2">👁️</span>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account 💕</button>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="{% url 'login' %}">Sign in</a>
    </div>
    <div class="auth-switch" style="margin-top:.6rem;">
      <a href="{% url 'home' %}">← Back to Home</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon  = document.getElementById(iconId);
  if (input.type === 'password') {
    input.type = 'text';
    icon.textContent = '🙈';
  } else {
    input.type = 'password';
    icon.textContent = '👁️';
  }
}
</script>
{% endblock %}
