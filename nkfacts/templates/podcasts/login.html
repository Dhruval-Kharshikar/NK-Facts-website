{% extends 'podcasts/base.html' %}
{% block title %}Login – NK Facts{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">NK</div>
    <h1 class="auth-title">Welcome Back 🌸</h1>
    <p class="auth-sub">Sign in to access all NK Facts episodes</p>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" name="username" placeholder="Your username" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In 💕</button>
    </form>

    <div class="auth-switch">
      Don't have an account? <a href="{% url 'signup' %}">Sign up for free</a>
    </div>
    <div class="auth-switch" style="margin-top:.6rem;">
      <a href="{% url 'home' %}">← Back to Home</a>
    </div>
  </div>
</div>
{% endblock %}
