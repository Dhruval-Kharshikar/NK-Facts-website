{% extends 'podcasts/base.html' %}
{% block title %}Password Reset Complete – NK Facts{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card" style="text-align:center;">
    <div style="font-size:4rem; margin-bottom:1rem;">✅</div>
    <h1 class="auth-title">Password Reset! 🌸</h1>
    <p class="auth-sub" style="margin-bottom:2rem;">
      Your password has been set successfully.
      You can now login with your new password.
    </p>
    <a href="{% url 'login' %}" class="btn btn-primary">Login Now 💕</a>
    <div class="auth-switch" style="margin-top:1rem;">
      <a href="{% url 'home' %}">← Back to Home</a>
    </div>
  </div>
</div>
{% endblock %}
