{% extends 'podcasts/base.html' %}
{% block title %}Forgot Password – NK Facts{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="https://s3-us-west-2.amazonaws.com/anchor-generated-image-bank/production/podcast_uploaded400/12881165/12881165-1615969851822-c84e3f1dc2b4c.jpg"
           alt="NK Facts" style="width:100%; height:100%; object-fit:cover; border-radius:50%;"/>
    </div>
    <h1 class="auth-title">Forgot Password? 🔑</h1>
    <p class="auth-sub">Enter your email and we'll send you a reset link</p>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="your@email.com" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Send Reset Link 💌</button>
    </form>

    <div class="auth-switch" style="margin-top:1.5rem;">
      Remember your password? <a href="{% url 'login' %}">Sign in</a>
    </div>
    <div class="auth-switch" style="margin-top:.6rem;">
      <a href="{% url 'home' %}">← Back to Home</a>
    </div>
  </div>
</div>
{% endblock %}
